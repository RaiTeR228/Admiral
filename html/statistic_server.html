<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // ОДИН РАЗ ОПРЕДЕЛЯЕМ БАЗОВЫЙ URL
        const API_BASE_URL = 'http://127.0.0.1:8000'; // Django на порту 8000
        
        async function fetchStats() {
            try {
                // ИСПОЛЬЗУЕМ ПОЛНЫЙ URL
                const response = await fetch(`${API_BASE_URL}/api/stats/list/`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                console.log('Stats data:', data);
                return data;
            } catch (error) {
                console.error('Error fetching stats:', error);
                document.getElementById('error-message').innerHTML = 
                    'Ошибка подключения к серверу. Убедитесь, что Django запущен: <br>' +
                    'python manage.py runserver';
                return null;
            }
        }

            //         body: JSON.stringify(data)
            //     });
                
            //     const result = await response.json();
            //     console.log('Send result:', result);
            // } catch (error) {
            //     console.error('Error sending stat:', error);
            // }
        }
        
        // Загружаем статистику при загрузке страницы
        window.onload = () => {
            fetchStats();
            // Отправляем тестовые данные
            sendStat();
        };
    </script>
</head>
<body>
